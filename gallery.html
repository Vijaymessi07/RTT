    <style>
        .gallery-page-section {
            padding: 150px 0 100px;
            background: var(--black-bg);
            min-height: 100vh;
        }

        .gallery-masonry {
            columns: 3 300px;
            column-gap: 20px;
            margin-top: 50px;
        }

        .gallery-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--trans-medium);
            break-inside: avoid;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--trans-slow);
        }

        .gallery-item:hover {
            transform: scale(1.02);
            border-color: var(--gold-primary);
            box-shadow: var(--shadow-heavy);
            z-index: 10;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 15, 74, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: var(--trans-fast);
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-overlay i {
            color: var(--gold-primary);
            font-size: 2rem;
            transform: scale(0.5);
            transition: var(--trans-fast);
        }

        .gallery-item:hover .gallery-overlay i {
            transform: scale(1);
        }
    </style>
</head>
